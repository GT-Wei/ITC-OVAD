__include__: [
  './include/itc_ovad_r50vd.yml',
]

# ---- model (same setup as itc_ovad_r50.yml) ----
HybridEncoder:
  TGFE_Flag: True
  VGTR_Flag: True
  VGTR_dict: {
    class_embeddings_channels: 1024,
    image_channels: 256,
    num_heads: 8
  }

ITCOVADTransformer:
  TGQE_Flag: True

# ---- zero-shot / open-vocabulary validation sets ----
# Edit the img_folder / ann_file paths to point at your local datasets.
# Use itc_ovad_dior_dota.pth for the DIOR & DOTA splits, itc_ovad_xview.pth for xView.
val_dataloader:
  type: DataLoader
  dataset:
    type: ConcatDataset
    datasets_list:
      DIOR_GZSD:
        type: ITCOVAD_Detection
        img_folder: datasets/DIOR/val/images
        ann_file:   datasets/DIOR/val/labelXML
        class_json_path: class_text_dict/eval_detail_v1.5/DIOR_GZSD.json
        coco_ann_json_path: datasets/annotations/DIOR_GZSD.json
        val_dataset_flag: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800]}
            - {type: ToImageTensor}
            - {type: ConvertDtype}
            - {type: LoadText}
      DIOR_ZSD:
        type: ITCOVAD_Detection
        img_folder: datasets/DIOR/val/images
        ann_file:   datasets/DIOR/val/labelXML
        class_json_path: class_text_dict/eval_detail_v1.5/DIOR_ZSD.json
        coco_ann_json_path: datasets/annotations/DIOR_ZSD.json
        val_dataset_flag: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800]}
            - {type: ToImageTensor}
            - {type: ConvertDtype}
            - {type: LoadText}
      DOTA_GZSD:
        type: ITCOVAD_Detection
        img_folder: datasets/DOTA/val/images
        ann_file:   datasets/DOTA/val/labelXML
        class_json_path: class_text_dict/eval_detail_v1.5/DOTA_GZSD_v1.5.json
        coco_ann_json_path: datasets/annotations/DOTA_GZSD_v1.5.json
        val_dataset_flag: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800]}
            - {type: ToImageTensor}
            - {type: ConvertDtype}
            - {type: LoadText}
      DOTA_ZSD:
        type: ITCOVAD_Detection
        img_folder: datasets/DOTA/val/images
        ann_file:   datasets/DOTA/val/labelXML
        class_json_path: class_text_dict/eval_detail_v1.5/DOTA_ZSD_v1.5.json
        coco_ann_json_path: datasets/annotations/DOTA_ZSD_v1.5.json
        val_dataset_flag: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800]}
            - {type: ToImageTensor}
            - {type: ConvertDtype}
            - {type: LoadText}
      xView_GZSD:
        type: ITCOVAD_Detection
        img_folder: datasets/xView/val/images
        ann_file:   datasets/xView/val/labelXML
        class_json_path: class_text_dict/eval_detail_v1.5/xView_GZSD.json
        coco_ann_json_path: datasets/annotations/xView_GZSD.json
        val_dataset_flag: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800]}
            - {type: ToImageTensor}
            - {type: ConvertDtype}
            - {type: LoadText}
      xView_ZSD:
        type: ITCOVAD_Detection
        img_folder: datasets/xView/val/images
        ann_file:   datasets/xView/val/labelXML
        class_json_path: class_text_dict/eval_detail_v1.5/xView_ZSD.json
        coco_ann_json_path: datasets/annotations/xView_ZSD.json
        val_dataset_flag: True
        transforms:
          type: Compose
          ops:
            - {type: Resize, size: [800, 800]}
            - {type: ToImageTensor}
            - {type: ConvertDtype}
            - {type: LoadText}
  shuffle: False
  batch_size: 4
  num_workers: 4
  drop_last: False
  pin_memory: True
  novel_classNum_list: [4, -1, 4, -1, 12, -1]
  collate_fn: default_collate_fn
